name: Test Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  WRANGLER_VER: 3.56.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install dependencies without prepare
        run: npm i --ignore-scripts

      - name: Probe blocklist endpoint
        run: |
          python - <<'PY'
          import urllib.request, ssl
          urls = [
              "https://cfstore.rethinkdns.com/blocklists/",
              "https://cfstore.rethinkdns.com/blocklists/2026/bc/6-2/u6/basicconfig.json",
          ]
          for u in urls:
              try:
                  with urllib.request.urlopen(u, timeout=20, context=ssl.create_default_context()) as r:
                      print(u, r.status)
              except Exception as e:
                  print(u, repr(e))
          PY
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Deploy
        run: npx wrangler@${WRANGLER_VER} deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
