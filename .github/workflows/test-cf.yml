name: Test Deploy to Cloudflare

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  GIT_REF: main
  WRANGLER_VER: 3.56.0
  WORKERS_ENV: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install deps without prepare
        run: npm i --ignore-scripts

      - name: Probe rethinkdns blocklist source
        run: |
          echo "DNS lookup:"
          getent hosts cfstore.rethinkdns.com || true
          echo
          echo "HTTP probe:"
          curl -I --retry 3 --connect-timeout 15 https://cfstore.rethinkdns.com/blocklists/ || true
          echo
          echo "Basicconfig probe:"
          wget -S --spider https://cfstore.rethinkdns.com/blocklists/2026/bc/6-2/u6/basicconfig.json || true

      - name: Run pre.sh with trace
        run: |
          chmod +x ./src/build/pre.sh
          bash -x ./src/build/pre.sh

      - name: Verify generated files
        run: |
          ls -lh ./src/u6-basicconfig.json ./src/u6-filetag.json
          test -s ./src/u6-basicconfig.json
          test -s ./src/u6-filetag.json

      - name: Build
        run: npm run build

      - name: Setup Wrangler
        run: npm i -D wrangler@${WRANGLER_VER}

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
