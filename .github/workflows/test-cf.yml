name: test CF
on:
  # github.com/serverless-dns/blocklists/blob/6021f80f/.github/workflows/createUploadBlocklistFilter.yml#L4-L6
  # schedule:
    # at 7:53 on 3rd, 10th, 18th, 26th of every month
    # - cron: '53 7 3,10,18,26 * *'
  # docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  # docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows#workflow_dispatch
  # docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#onworkflow_dispatchinputs
  workflow_dispatch:
    # github.blog/changelog/2020-07-06-github-actions-manual-triggers-with-workflow_dispatch/
    # docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions#inputs
    inputs:
      # docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onworkflow_dispatchinputs
      environment:
        description: 'wrangler env to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod
        - one
      commit:
        description: 'git tip commit to deploy'
        default: 'main'
        required: true

  push:
    # TODO: inputs.environment and inputs.commit
    branches:
      - "main"
    tags:
      - "v*"
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/cf.yml"
      - ".env.example"
      - ".eslintrc.cjs"
      - ".prettierignore"
      - "fly.toml"
      - "README.md"
      - "node.Dockerfile"
      - "deno.Dockerfile"
      - "import_map.json"
      - ".vscode/*"
      - ".husky/*"
      - ".prettierrc.json"
      - "LICENSE"
      - "run"
  repository_dispatch:

env:
  GIT_REF: ${{ github.event.inputs.commit || github.ref }}
  WRANGLER_VER: '3.56.0'
  # default is 'dev' which is really empty/no env
  WORKERS_ENV: ''

jobs:
  deploy:
    name: 🚀 Deploy worker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
          fetch-depth: 0

      - name: 🛸 Env?
        # 'dev' env deploys to default WORKERS_ENV, which is, '' (an empty string)
        if: github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'one'
        run: |
          echo "WORKERS_ENV=${WENV}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
        shell: bash
        env:
          WENV: ${{ github.event.inputs.environment }}
          COMMIT_SHA: ${{ github.sha }}

      - name: 🎱 Tag?
        # docs.github.com/en/actions/learn-github-actions/contexts#github-context
        if: github.ref_type == 'tag'
        run: |
          echo "WORKERS_ENV=${WENV}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
        shell: bash
        env:
          # tagged deploys always deploy to prod
          WENV: 'prod'
          COMMIT_SHA: ${{ github.sha }}

      - name: 🌽 Cron?
        if: github.event.schedule == '53 7 3,10,18,26 * *'
        run: |
          echo "WORKERS_ENV=${WENV}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
        shell: bash
        env:
          # cron deploys always deploy to prod
          WENV: 'prod'
          COMMIT_SHA: ${{ github.sha }}

      # ── FIX START ──────────────────────────────────────────────────────────
      # pre.sh (triggered by npm prepare) downloads basicconfig.json +
      # filetag.json from cfstore.rethinkdns.com. When the CDN is unreachable
      # wget exits with code 4 (network failure), pre.sh returns exit 1, and
      # npm i fails. We pre-fetch the files here before npm i runs, with
      # week-rollback retry logic and a safe stub fallback.

      - name: 📅 Compute blocklist week key
        id: blweek
        run: |
          DAY=$(date -u +%-d)
          WK=$(( (DAY + 6) / 7 ))
          MM=$(date -u +%-m)
          YYYY=$(date -u +%Y)
          echo "key=${YYYY}-${MM}-${WK}" >> $GITHUB_OUTPUT

      - name: 📦 Cache blocklist files
        id: cache-blocklist
        uses: actions/cache@v4
        with:
          path: |
            src/u6-basicconfig.json
            src/u6-filetag.json
          key: blocklist-${{ steps.blweek.outputs.key }}

      - name: ⬇️ Download blocklist (week-rollback + stub fallback)
        if: steps.cache-blocklist.outputs.cache-hit != 'true'
        run: |
          BURL="https://cfstore.rethinkdns.com/blocklists"
          CODEC="u6"
          DIR="bc"
          F="basicconfig.json"
          F2="filetag.json"
          OUT="./src/${CODEC}-${F}"
          OUT2="./src/${CODEC}-${F2}"
          NOW=$(date --utc +"%s")
          DAY=$(date -d "@$NOW" "+%-d")
          WK=$(( (DAY + 6) / 7 ))
          MM=$(date -d "@$NOW" "+%-m")
          YYYY=$(date -d "@$NOW" "+%Y")

          mkdir -p ./src

          for i in 0 1 2 3 4; do
            echo "→ try ${YYYY}/${MM}-${WK}"
            wget --timeout=20 --tries=3 --waitretry=5 \
              -q "${BURL}/${YYYY}/${DIR}/${MM}-${WK}/${CODEC}/${F}" -O "$OUT"
            WCODE=$?
            if [ $WCODE -eq 0 ]; then
              FTSTAMP=$(cut -d"," -f9 "$OUT" | cut -d":" -f2 | tr -dc '0-9/')
              if ! echo "$FTSTAMP" | grep -q '/'; then
                FTSTAMP=$(cut -d"," -f8 "$OUT" | cut -d":" -f2 | tr -dc '0-9/')
              fi
              echo "✓ basicconfig ok; fetching filetag @ ${FTSTAMP}"
              wget --timeout=20 --tries=3 --waitretry=5 \
                -q "${BURL}/${FTSTAMP}/${CODEC}/${F2}" -O "$OUT2"
              WCODE2=$?
              if [ $WCODE2 -eq 0 ]; then
                echo "✓ filetag ok — done"
                break
              else
                echo "✗ filetag failed (${WCODE2})"
                rm -f "$OUT" "$OUT2"
              fi
            else
              rm -f "$OUT"
              echo "✗ basicconfig failed (${WCODE})"
            fi

            # roll back one week
            WK=$((WK - 1))
            if [ $WK -eq 0 ]; then WK=5; MM=$((MM - 1)); fi
            if [ $MM -eq 0 ]; then MM=12; YYYY=$((YYYY - 1)); fi
          done

          # stub fallback: ensures pre.sh finds existing files and exits 0
          if [ ! -f "$OUT" ]; then
            echo "⚠ writing basicconfig stub"
            echo '{"version":0,"timestamp":0,"nodecount":0,"lists":{}}' > "$OUT"
          fi
          if [ ! -f "$OUT2" ]; then
            echo "⚠ writing filetag stub"
            echo '{}' > "$OUT2"
          fi
      # ── FIX END ────────────────────────────────────────────────────────────

      # npm (and node16) are installed by wrangler-action in a pre-job setup
      - name: 🏗 Get dependencies
        run: npm i

      - name: 📚 Wrangler publish
        # github.com/cloudflare/wrangler-action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          # input overrides env-defaults, regardless
          environment: ${{ env.WORKERS_ENV }}
          wranglerVersion: ${{ env.WRANGLER_VER }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
        env:
          # setting CLOUDFLARE_ACCOUNT_ID no longer works
          GIT_COMMIT_ID: ${{ env.COMMIT_SHA }}

      - name: 🎤 Notice
        run: |
          echo "::notice::Deployed to ${WORKERS_ENV} / ${GIT_REF} @ ${COMMIT_SHA}"
