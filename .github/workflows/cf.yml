name: ⛅ CF

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'wrangler env to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
          - one
      commit:
        description: 'git tip commit to deploy'
        default: 'main'
        required: true

  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/cf.yml"
      - ".env.example"
      - ".eslintrc.cjs"
      - ".prettierignore"
      - "fly.toml"
      - "README.md"
      - "node.Dockerfile"
      - "deno.Dockerfile"
      - "import_map.json"
      - ".vscode/*"
      - ".husky/*"
      - ".prettierrc.json"
      - "LICENSE"
      - "run"

  repository_dispatch:

env:
  GIT_REF: ${{ github.event.inputs.commit || github.ref }}
  WRANGLER_VER: '3.56.0'
  WORKERS_ENV: ''
  CF_BLOCKLIST_BASE: 'https://cfstore.ding-king.cf/blocklists'
  CF_BC_PATH: '2026/bc/6-2/u6/basicconfig.json'

jobs:
  deploy:
    name: 🚀 Deploy worker
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
          fetch-depth: 0

      - name: Env?
        if: github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'one'
        run: |
          echo "WORKERS_ENV=${WENV}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
        shell: bash
        env:
          WENV: ${{ github.event.inputs.environment }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Tag?
        if: github.ref_type == 'tag'
        run: |
          echo "WORKERS_ENV=${WENV}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
        shell: bash
        env:
          WENV: 'prod'
          COMMIT_SHA: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install dependencies without prepare
        run: npm i --ignore-scripts

      - name: Fetch blocklist metadata from custom R2
        run: |
          mkdir -p src

          url1="${CF_BLOCKLIST_BASE}/${CF_BC_PATH}"
          echo "basicconfig url: ${url1}"
          curl -fsSL "${url1}" -o src/u6-basicconfig.json

          test -s src/u6-basicconfig.json
          cat src/u6-basicconfig.json

          ts=$(jq -r '.timestamp' src/u6-basicconfig.json)
          test -n "$ts"
          test "$ts" != "null"

          url2="${CF_BLOCKLIST_BASE}/${ts}/u6/filetag.json"
          echo "filetag url: ${url2}"
          curl -fsSL "${url2}" -o src/u6-filetag.json

          test -s src/u6-filetag.json
          cat src/u6-filetag.json

      - name: Build
        run: npm run build
        env:
          CF_BLOCKLIST_URL: ${{ env.CF_BLOCKLIST_BASE }}

      - name: Wrangler publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          environment: ${{ env.WORKERS_ENV }}
          wranglerVersion: ${{ env.WRANGLER_VER }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
        env:
          GIT_COMMIT_ID: ${{ env.COMMIT_SHA }}
          CF_BLOCKLIST_URL: ${{ env.CF_BLOCKLIST_BASE }}

      - name: Notice
        run: |
          echo "::notice::Deployed to ${WORKERS_ENV} / ${GIT_REF} @ ${COMMIT_SHA}"
